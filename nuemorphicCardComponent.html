<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>Socials Card UI Test</title>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
<title>Neumorphic Card Component</title>

</head>
<body>
<body>
  <div class="card-container">
      <a href="/" class="hero-image-container">
        <img class="hero-image" src="https://i.postimg.cc/NfR2yhNs/image-equilibrium.jpg" alt="Spinning glass cube"/>
      </a>
      <main class="main-content">
        <h1><a href="#">Equilibrium #3429</a></h1>
        <p>Our Equilibrium collection promotes balance and calm.</p>
        <div class="flex-row">
          <div class="coin-base">
            <img src="https://i.postimg.cc/T1F1K0bW/Ethereum.png" alt="Ethereum" class="small-image"/>
            <h2>0.041 ETH</h2>
          </div>
          <div class="time-left">
            <img src="https://i.postimg.cc/prpyV4mH/clock-selection-no-bg.png" alt="clock" class="small-image"/>
            <p>3 days left</p>
          </div>
        </div>
      </main>
      <div class="card-attribute">
        <img src="https://i.postimg.cc/SQBzNQf1/image-avatar.png" alt="avatar" class="small-avatar"/>
        <p>Creation of <span><a href="#">Jules Wyvern</a></span></p>
      </div>
    </div>
</div>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Lauro235</a>.
  </div>
</body>
<style>
/* Importing the 'Outfit' font from Google Fonts */
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');

/* Root element where custom CSS variables are defined */
:root {
    font-size: 15px;

    /* Primary Colors */
    --var-soft-blue: hsl(215, 51%, 70%);
    --var-cyan: hsl(178, 100%, 50%);

    /* Neutral Colors */
    --var-main-darkest: hsl(217, 54%, 11%);
    --var-card-dark: hsl(216, 50%, 16%);
    --var-line-dark: hsl(215, 32%, 27%);
    --var-lightest: white;

    /* Fonts */
    --var-heading: normal normal 600 1.5em/1.6em 'Outfit', sans-serif;
    --var-small-heading: normal normal 400 1em/1em 'Outfit', sans-serif;
    --var-para: normal normal 300 1em/1.55em 'Outfit', sans-serif;
}

/* Setting the box-sizing model to border-box for all elements */
html {
    box-sizing: border-box;
}

*, *::before, *::after {
    box-sizing: inherit;
    margin: 0;
}

/* Styling for the body element */
body {
    background-color: var(--var-main-darkest);
}

/* Image styling */
img {
    width: 100%;
    border-radius: 15px;
    display: block;
}

/* Link styling */
a {
    color: inherit;
}

/* Heading 1 styling */
h1 {
    font: var(--var-heading);
    color: var(--var-lightest);
    padding: 1.2em 0;
}

/* Heading 2 styling */
h2 {
    font: var(--var-small-heading);
    color: var(--var-lightest);
    /* padding on .coin-base */
}

/* Paragraph styling */
p {
    font: var(--var-para);
    color: var(--var-soft-blue);
}

/* Span styling */
span {
    color: white;
}

/* Card container styling */
.card-container {
    width: 100%;
    max-width: 400px;
    margin: 2em auto;
    background-color: var(--var-card-dark);
    border-radius: 15px;
    margin-bottom: 1rem;
    padding: 2rem;
}

/* Flex row styling */
div.flex-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Coin base, time left, and card attribute styling */
div.coin-base, .time-left, .card-attribute {
    display: flex;
    align-items: center;
    padding: 1em 0;
}

/* Card attribute styling */
.card-attribute {
    padding-bottom: 1.5em;
    border-top: 2px solid var(--var-line-dark);
}

/* Hero image container styling */
a.hero-image-container {
    position: relative;
    display: block;
}

/* Eye image styling */
img.eye {
    position: absolute;
    width: 100%;
    max-width: 2em;
    top: 44%;
    left: 43%;
}

/* Media query for larger eye image on wider screens */
@media (min-width:400px) {
  img.eye {
    max-width: 3em;
  }
}

/* Hero image container hover effect */
.hero-image-container::after {
    content: '';
    background-image: url("https://i.postimg.cc/9MtT4GZY/view.png");
    background-position: center;
    background-repeat: no-repeat;
    background-size: 5rem;
    background-color: hsla(178, 100%, 50%, 0.3);
    width: 100%;
    height: 100%;
    border-radius: 1rem;
    position: absolute;
    top: 0;
    left: 0;
    display: block;
    z-index: 2;
    opacity: 0;
    transition: opacity 0.3s ease-out;
}

/* Hero image container hover state */
.hero-image-container:hover::after {
  opacity: 1;
}

/* Small image styling */
.small-image {
    width: 1.2em;
    margin-right: .5em;
}

/* Small avatar styling */
.small-avatar {
    width: 2em;
    border-radius: 200px;
    outline: 2px solid white;
    margin-right: 1.4em;
}

/* Attribution styling */
div.attribution {
    margin: 0 auto;
    width: 100%;
    font: var(--var-para);
    text-align: center;
    padding: 1.5em 0 4em 0;
    color: var(--var-line-dark);
}

/* Attribution link styling */
.attribution a {
    color: var(--var-soft-blue);
}

/* Media query for larger font size on wider screens */
@media (min-width:600px) {
    body {
        font-size: 18px;
    }
}

</style>>
  
</body>
</html>
